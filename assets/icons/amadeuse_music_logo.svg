<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with music theme gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c64f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4752c4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>

  <!-- Inner circle for depth -->
  <circle cx="256" cy="256" r="200" fill="#000000" opacity="0.1"/>

  <!-- Music equalizer bars representing songs -->
  <g fill="url(#barGradient)">
    <!-- Left side bars -->
    <rect x="120" y="280" width="20" height="80" rx="10" ry="10"/>
    <rect x="150" y="240" width="20" height="160" rx="10" ry="10"/>
    <rect x="180" y="200" width="20" height="240" rx="10" ry="10"/>
    <rect x="210" y="220" width="20" height="200" rx="10" ry="10"/>
    
    <!-- Center bars (taller for emphasis) -->
    <rect x="240" y="160" width="20" height="320" rx="10" ry="10"/>
    <rect x="270" y="140" width="20" height="360" rx="10" ry="10"/>
    
    <!-- Right side bars -->
    <rect x="300" y="220" width="20" height="200" rx="10" ry="10"/>
    <rect x="330" y="200" width="20" height="240" rx="10" ry="10"/>
    <rect x="360" y="240" width="20" height="160" rx="10" ry="10"/>
    <rect x="390" y="280" width="20" height="80" rx="10" ry="10"/>
  </g>

  <!-- Decorative music notes -->
  <g fill="white" opacity="0.8">
    <!-- Left music note -->
    <circle cx="100" cy="120" r="6"/>
    <rect x="97" y="90" width="6" height="30"/>
    <path d="M 103 90 Q 115 85 115 100" stroke="white" stroke-width="3" fill="none"/>
    
    <!-- Right music note -->
    <circle cx="420" cy="400" r="6"/>
    <rect x="417" y="370" width="6" height="30"/>
    <path d="M 423 370 Q 435 365 435 380" stroke="white" stroke-width="3" fill="none"/>
  </g>

  <!-- Main title -->
  <text x="256" y="120" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="white">AMADEUSE</text>
  
  <!-- Subtitle -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">MUSIC</text>

  <!-- Subtle glow effect -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
</svg>
