<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with music theme gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c64f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4752c4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>

  <!-- Music equalizer bars representing songs (simplified for icon) -->
  <g fill="url(#barGradient)">
    <!-- Simplified bars for better visibility at small sizes -->
    <rect x="140" y="300" width="30" height="100" rx="15" ry="15"/>
    <rect x="180" y="250" width="30" height="200" rx="15" ry="15"/>
    <rect x="220" y="200" width="30" height="300" rx="15" ry="15"/>
    <rect x="260" y="180" width="30" height="340" rx="15" ry="15"/>
    <rect x="300" y="200" width="30" height="300" rx="15" ry="15"/>
    <rect x="340" y="250" width="30" height="200" rx="15" ry="15"/>
    <rect x="380" y="300" width="30" height="100" rx="15" ry="15"/>
  </g>

  <!-- Letter "A" for AMADEUSE in center -->
  <text x="256" y="320" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="white" opacity="0.3">A</text>

  <!-- Subtle glow effect -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="white" stroke-width="3" opacity="0.4"/>
</svg>
